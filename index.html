<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="shortcut icon" type="image/jpeg" href="/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <link
      rel="preload"
      as="image"
      href="/media/hero/hero-mobile-poster.3379036e.jpg"
      fetchpriority="high"
    />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/outfit-latin-400-700.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/michroma-latin-400.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/orbitron-latin-500.woff2" crossorigin />
    <script>
      (function recoverFromStaleChunks() {
        var RETRY_KEY = 'classiccar-chunk-retry'
        var RETRY_PARAM = '_cc_reload'
        var REASON_PARAM = '_cc_reason'
        var hasRetriedInMemory = false

        function hasRetried() {
          if (hasRetriedInMemory) return true
          try {
            return sessionStorage.getItem(RETRY_KEY) === '1'
          } catch (error) {
            try {
              return new URL(window.location.href).searchParams.has(RETRY_PARAM)
            } catch (urlError) {
              return false
            }
          }
        }

        function markRetried() {
          hasRetriedInMemory = true
          try {
            sessionStorage.setItem(RETRY_KEY, '1')
          } catch (error) {
            // Ignore storage failures.
          }
        }

        function cleanupRetryParams() {
          try {
            var url = new URL(window.location.href)
            if (!url.searchParams.has(RETRY_PARAM) && !url.searchParams.has(REASON_PARAM)) return
            url.searchParams.delete(RETRY_PARAM)
            url.searchParams.delete(REASON_PARAM)
            window.history.replaceState(null, '', url.toString())
          } catch (error) {
            // Ignore URL parsing failures.
          }
        }

        function isRecoverableAsset(target) {
          if (!target || !(target instanceof HTMLElement)) return false

          if (target.tagName === 'SCRIPT') {
            return target.getAttribute('type') === 'module'
          }

          if (target.tagName === 'LINK') {
            var rel = (target.getAttribute('rel') || '').toLowerCase()
            return rel === 'modulepreload' || rel === 'stylesheet'
          }

          return false
        }

        function forceRefresh(reason) {
          if (hasRetried()) return
          markRetried()

          var url = new URL(window.location.href)
          url.searchParams.set(RETRY_PARAM, Date.now().toString())
          url.searchParams.set(REASON_PARAM, reason)
          window.location.replace(url.toString())
        }

        cleanupRetryParams()

        window.addEventListener(
          'error',
          function (event) {
            var target = event.target
            if (isRecoverableAsset(target)) {
              forceRefresh('asset-load-failed')
            }
          },
          true,
        )

        window.addEventListener('unhandledrejection', function (event) {
          var message = String((event && event.reason && event.reason.message) || event.reason || '')
          if (
            message.indexOf('Failed to fetch dynamically imported module') !== -1 ||
            message.indexOf('Importing a module script failed') !== -1
          ) {
            forceRefresh('module-load-failed')
          }
        })
      })()
    </script>
    <meta name="description" content="Classic Car — Jordan's premier destination for luxury and performance vehicles. Browse our curated collection of premium automobiles." />
    <title>Classic Car — Premium Automotive Excellence</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
